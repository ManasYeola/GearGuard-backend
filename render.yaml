services:
  - type: web
    name: gearguard-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_NOTIFICATIONS_ENABLED
        value: "false"

  - type: cron
    name: gearguard-backend-keepalive
    env: node
    plan: free
    rootDir: .
    schedule: "*/10 * * * *"
    buildCommand: npm install
    startCommand: node scripts/keepAlive.js
    envVars:
      - key: BACKEND_URL
        sync: false
